services:
  - type: web
    name: caregist-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_MASTER_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        value: price_1TFvyt4mijLHzRRkyouYDBqo
      - key: STRIPE_PRICE_PRO
        value: price_1TFw1h4mijLHzRRkiGDF4P8X
      - key: STRIPE_PRICE_BUSINESS
        value: price_1TFw3p4mijLHzRRkTuNDsac0
      - key: RESEND_API_KEY
        sync: false
      - key: ENQUIRY_FROM_EMAIL
        sync: false
      - key: CORS_ORIGINS
        value: https://caregist.co.uk,https://www.caregist.co.uk,http://localhost:3000
      - key: APP_URL
        value: https://caregist.co.uk
      - key: PYTHON_VERSION
        value: "3.12.0"
    healthCheckPath: /api/v1/health
