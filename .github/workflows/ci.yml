name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + pip check + audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: pip check (dependency resolution)
        run: pip check

      - name: pytest
        env:
          API_MASTER_KEY: ci_test_master_key
          SUPPORT_INTERNAL_TOKEN: ci_test_support_token
        run: pytest -q

      - name: pip-audit (vulnerabilities)
        # Fail the build on known CVEs in backend deps.
        run: pip-audit --requirement requirements.txt --strict

  frontend:
    name: Frontend (tsc + tests + build + audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Production build
        env:
          # next.config.ts throws at build time when these are missing in production mode.
          API_URL: http://localhost:8000
          API_KEY: ci_test_api_key
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: npm audit (high/critical only)
        # Transitive dev-tool vulns are common; gate on high+ to catch real risk without noise.
        run: npm audit --audit-level=high
