<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" role="img" aria-labelledby="title desc">
  <title id="title">CareGist logo</title>
  <desc id="desc">A warm, trustworthy logo mark for CareGist featuring a stylised C formed by a protective arc with three quality markers, followed by the CareGist wordmark.</desc>
  <rect width="920" height="220" fill="none"/>
  <g transform="translate(24 20)">
    <!-- Icon mark -->
    <g transform="translate(0 0)">
      <!-- Protective C arc -->
      <path d="M132 28
               A74 74 0 1 0 132 152"
            fill="none"
            stroke="#C1784F"
            stroke-width="22"
            stroke-linecap="round"/>

      <!-- Inner intelligence/quality markers -->
      <g fill="#C1784F">
        <rect x="117" y="54" width="16" height="16" rx="5"/>
        <rect x="129" y="82" width="18" height="18" rx="5"/>
        <rect x="117" y="114" width="16" height="16" rx="5"/>
      </g>

      <!-- Quiet inner support stroke for depth in monochrome-safe form -->
      <path d="M120 52
               A48 48 0 1 0 120 128"
            fill="none"
            stroke="#6B4C35"
            stroke-width="6"
            stroke-linecap="round"
            opacity="0.12"/>
    </g>

    <!-- Wordmark -->
    <g transform="translate(190 126)">
      <text x="0" y="0"
            font-family="'Playfair Display', Georgia, serif"
            font-size="76"
            font-weight="700"
            letter-spacing="0.2">
        <tspan fill="#D4943A">C</tspan><tspan fill="#F5EFE4">areGist</tspan>
      </text>
    </g>
  </g>
</svg>
