[databases]
; Route all connections for the caregist database through this pool.
; Replace HOST and PORT with your PostgreSQL server's address.
caregist = host=127.0.0.1 port=5432 dbname=caregist

[pgbouncer]
; --- Connection pooling ---
; Transaction pooling is the right mode for asyncpg.
; Each asyncpg connection holds a server connection only for the duration of
; a single transaction, then releases it. This allows a small number of actual
; Postgres connections to serve many application connections safely.
pool_mode = transaction

; Total server-side connections PgBouncer will open to PostgreSQL.
; With asyncpg max_size=20 across multiple workers, set this to
; (workers * 20) + 10 headroom. For a 2-worker deployment: 50.
max_client_conn = 200
default_pool_size = 50
min_pool_size = 5
reserve_pool_size = 10

; --- Authentication ---
; auth_type = md5 works for most setups. Use scram-sha-256 for PostgreSQL 14+.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; --- Network ---
listen_addr = 127.0.0.1
listen_port = 6432

; --- Timeouts ---
server_connect_timeout = 15
server_idle_timeout = 600
client_idle_timeout = 300
query_timeout = 30

; --- Logging ---
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; --- TLS (enable if PgBouncer is not on the same host as Postgres) ---
; server_tls_sslmode = require
; server_tls_ca_file = /etc/ssl/certs/ca-certificates.crt
