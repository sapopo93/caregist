# scripts/_secret-scan-workflow.yml
# ─────────────────────────────────────────────────────────────────────────────
# Caregist CI — Secret scan + cookie-banner guard
#
# MORTISE: secret-scan checks (pattern-based).
# LATTICE: cookie-banner guard (checks that any new external <script src> or
#          <link rel="preconnect"> in the PR diff is accompanied by a change
#          to frontend/components/CookieBanner.tsx (the consent gate).
#
# This file is staged by Mortise and extended here by Lattice.
# The two jobs run in the same workflow so they share a single PR check status.
# ─────────────────────────────────────────────────────────────────────────────

name: Secret scan + cookie-banner guard

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ─── Mortise: secret scan ────────────────────────────────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret pattern scan
        run: |
          # Scan diff for common secret patterns (Mortise-owned check)
          git diff origin/${{ github.base_ref }}...HEAD -- . | \
            grep -E '(AKIA[0-9A-Z]{16}|sk_live_[0-9a-zA-Z]{24,}|ghp_[0-9a-zA-Z]{36}|-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----)' && \
            { echo "::error::Potential secret detected in diff. Review before merging."; exit 1; } || \
            echo "No secret patterns found."

  # ─── Lattice: cookie-banner guard ────────────────────────────────────────
  cookie-banner-guard:
    name: Cookie-banner guard (PECR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new external scripts without banner update
        shell: bash
        run: |
          set -euo pipefail

          BASE_BRANCH="${{ github.base_ref }}"
          DIFF=$(git diff "origin/${BASE_BRANCH}...HEAD" -- '*.tsx' '*.ts' '*.js' '*.jsx' '*.html' '*.mjs')

          # Detect added lines with external <script src="http..."> or
          # <link rel="preconnect" href="http...">
          NEW_EXTERNAL_SCRIPTS=$(echo "$DIFF" | grep '^+' | grep -v '^+++' | \
            grep -E '<script[^>]+src=["\x27]https?://' || true)
          NEW_PRECONNECTS=$(echo "$DIFF" | grep '^+' | grep -v '^+++' | \
            grep -E '<link[^>]+rel=["\x27]preconnect["\x27][^>]+href=["\x27]https?://' || true)
          # Also catch Next.js Script component with external src
          NEW_NEXT_SCRIPTS=$(echo "$DIFF" | grep '^+' | grep -v '^+++' | \
            grep -E '<Script[^>]+src=["\x27]https?://' || true)

          if [ -n "$NEW_EXTERNAL_SCRIPTS" ] || [ -n "$NEW_PRECONNECTS" ] || [ -n "$NEW_NEXT_SCRIPTS" ]; then
            echo "--- New external script/preconnect origins detected ---"
            echo "$NEW_EXTERNAL_SCRIPTS"
            echo "$NEW_PRECONNECTS"
            echo "$NEW_NEXT_SCRIPTS"
            echo "-------------------------------------------------------"

            # Check whether CookieBanner.tsx was also modified in this PR
            BANNER_CHANGED=$(git diff "origin/${BASE_BRANCH}...HEAD" \
              --name-only -- 'frontend/components/CookieBanner.tsx' | wc -l)

            if [ "$BANNER_CHANGED" -eq 0 ]; then
              echo "::error::New external <script src> or <link rel=preconnect> added without"
              echo "::error::updating frontend/components/CookieBanner.tsx."
              echo "::error::All third-party script origins must be gated behind consent."
              echo "::error::Add the new origin to the Functional (or Analytics) category"
              echo "::error::in CookieBanner.tsx and document it in the PR description."
              exit 1
            else
              echo "CookieBanner.tsx was also modified — guard passed."
            fi
          else
            echo "No new external script origins detected — guard passed."
          fi
