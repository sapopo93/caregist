name: Secret Scan

on:
  pull_request:

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Scan PR diff for credentials
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan changed files for credential patterns
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "Scanning diff from ${BASE_SHA} to ${HEAD_SHA}"

          # Get list of added/modified files (exclude deletions)
          mapfile -t CHANGED_FILES < <(
            git diff --name-only --diff-filter=ACMR "${BASE_SHA}...${HEAD_SHA}"
          )

          if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
            echo "No changed files to scan."
            exit 0
          fi

          BLOCKED=0

          check_pattern() {
            local file="$1"
            local pattern_name="$2"
            local regex="$3"
            if git show "${HEAD_SHA}:${file}" 2>/dev/null | grep -qE "$regex" 2>/dev/null; then
              echo "BLOCKED: ${file}: ${pattern_name}"
              BLOCKED=1
            fi
          }

          for file in "${CHANGED_FILES[@]}"; do
            # Confirm file exists at HEAD (skip submodule pointers etc.)
            git show "${HEAD_SHA}:${file}" >/dev/null 2>&1 || continue

            check_pattern "$file" "AWS access key (AKIA...)" \
              'AKIA[0-9A-Z]{16}'

            check_pattern "$file" "AWS secret access key" \
              'aws_secret_access_key[[:space:]]*=[[:space:]]*[A-Za-z0-9/+]{40}'

            check_pattern "$file" "Stripe live secret key (sk_live_...)" \
              'sk_live_[0-9a-zA-Z]{24,}'

            check_pattern "$file" "Stripe restricted live key (rk_live_...)" \
              'rk_live_[0-9a-zA-Z]{24,}'

            check_pattern "$file" "Stripe publishable live key (pk_live_...)" \
              'pk_live_[0-9a-zA-Z]{24,}'

            check_pattern "$file" "Resend API key (re_...)" \
              're_[A-Za-z0-9]{16,}'

            check_pattern "$file" "Anthropic API key (sk-ant-api03-...)" \
              'sk-ant-api03-[A-Za-z0-9_-]{40,}'

            check_pattern "$file" "OpenAI API key (sk-...)" \
              'sk-(?!ant)[A-Za-z0-9]{40,}'

            check_pattern "$file" "JWT token (eyJ...)" \
              'eyJ[A-Za-z0-9_-]+\.eyJ[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+'

            check_pattern "$file" "GitHub PAT classic (ghp_...)" \
              'ghp_[A-Za-z0-9]{36}'

            check_pattern "$file" "GitHub PAT fine-grained (github_pat_...)" \
              'github_pat_[A-Za-z0-9_]{82}'

            check_pattern "$file" "Slack bot token (xoxb-...)" \
              'xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+'

            check_pattern "$file" "Slack webhook URL" \
              'hooks\.slack\.com/services/[A-Za-z0-9/]+'
          done

          if [ "$BLOCKED" -ne 0 ]; then
            echo ""
            echo "Secret scan FAILED. Remove credentials before merging."
            echo "If this is a false positive, open a discussion with the security team."
            exit 1
          fi

          echo "Secret scan passed — no credential patterns found."
