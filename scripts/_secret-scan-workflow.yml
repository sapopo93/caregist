# scripts/_secret-scan-workflow.yml
#
# Staged by Mortise PR #4. Extended by Spindle (F#4) to guard against
# NEXT_PUBLIC_* env vars being set to secret-looking values, which would
# bake credentials into the JS bundle.
#
# To use: copy the job definition below into .github/workflows/ci.yml or
# merge it into your existing secret-scan workflow.

name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # F#4 guard: fail if any NEXT_PUBLIC_* env var in .env* files or source
      # contains a value that looks like a real secret. These vars are baked
      # into the browser JS bundle and visible to any site visitor in DevTools.
      # -----------------------------------------------------------------------
      - name: Check for NEXT_PUBLIC_* secret exposure
        shell: bash
        run: |
          set -euo pipefail

          SECRET_PATTERN='AKIA[0-9A-Z]{16}|sk_live_[0-9a-zA-Z]+|sk_test_[0-9a-zA-Z]+|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{82}|xoxb-[0-9a-zA-Z-]+'

          FAILURES=0

          echo "Scanning for NEXT_PUBLIC_* vars with secret-like values..."

          # Scan env files
          for f in $(find . -maxdepth 4 \
              -name ".env" -o -name ".env.*" -o -name "*.env" \
              | grep -v ".git" | grep -v "node_modules"); do
            while IFS= read -r line; do
              # Match lines like NEXT_PUBLIC_FOO=<value>
              if echo "$line" | grep -qE '^NEXT_PUBLIC_[A-Z_]+='; then
                value=$(echo "$line" | cut -d= -f2-)
                if echo "$value" | grep -qE "$SECRET_PATTERN"; then
                  echo "FAIL: secret-like value in NEXT_PUBLIC_ var in $f"
                  echo "  Line: $line"
                  FAILURES=$((FAILURES + 1))
                fi
              fi
            done < "$f"
          done

          # Scan source files for NEXT_PUBLIC_API_KEY references (F#4 specific)
          if grep -rn --include="*.ts" --include="*.tsx" --include="*.js" --include="*.jsx" \
              "NEXT_PUBLIC_API_KEY" \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.next .; then
            echo "FAIL: NEXT_PUBLIC_API_KEY referenced in source files."
            echo "  This bakes the backend master key into the JS bundle (F#4)."
            echo "  Use API_KEY (server-only, no NEXT_PUBLIC_ prefix) instead."
            FAILURES=$((FAILURES + 1))
          fi

          if [ "$FAILURES" -gt 0 ]; then
            echo ""
            echo "Found $FAILURES secret exposure issue(s). See output above."
            exit 1
          fi

          echo "No NEXT_PUBLIC_* secret exposure detected."
