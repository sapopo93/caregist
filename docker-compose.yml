services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: caregist
      POSTGRES_USER: caregist
      POSTGRES_PASSWORD: ${DB_PASSWORD:-caregist_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caregist"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: .
      dockerfile: Dockerfile.seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://caregist:${DB_PASSWORD:-caregist_dev}@db:5432/caregist
    volumes:
      - ./directory_providers.csv:/data/directory_providers.csv:ro

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://caregist:${DB_PASSWORD:-caregist_dev}@db:5432/caregist
      API_MASTER_KEY: ${API_MASTER_KEY:-dev_key_change_me}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_STARTER: ${STRIPE_PRICE_STARTER:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_BUSINESS: ${STRIPE_PRICE_BUSINESS:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "8000:8000"

volumes:
  pgdata:
